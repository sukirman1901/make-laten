<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>make-laten dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(20, 20, 30, 0.8);
      --bg-card-hover: rgba(25, 25, 40, 0.9);
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(99, 102, 241, 0.5);
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.2);
      --success: #22c55e;
      --success-glow: rgba(34, 197, 94, 0.2);
      --warning: #eab308;
      --warning-glow: rgba(234, 179, 8, 0.2);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.2);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 20px var(--accent-glow);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Layout */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      font-size: 18px;
      font-weight: 700;
      padding: 0 12px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-logo span { color: var(--accent); }

    .nav-item {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 14px;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: var(--bg-card);
      color: var(--text-primary);
      border-color: var(--border);
    }

    .nav-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .nav-item.active {
      background: var(--accent-glow);
      color: var(--accent);
      border-color: var(--border-focus);
    }

    /* Main */
    .main {
      padding: 32px;
      overflow-y: auto;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: var(--transition);
      box-shadow: var(--shadow);
    }

    .card:hover {
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
      border-color: var(--border-focus);
    }

    .card-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .card-value {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    .card-value.accent { color: var(--accent); }
    .card-value.success { color: var(--success); }
    .card-value.warning { color: var(--warning); }
    .card-value.danger { color: var(--danger); }

    /* Charts */
    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-secondary);
    }

    /* Table */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      font-weight: 600;
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }

    tr { transition: var(--transition-fast); }
    tr:hover td { background: var(--accent-glow); }

    /* Graph */
    #graph-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 600px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #graph-container svg { width: 100%; height: 100%; }

    .graph-node {
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .graph-node:hover { filter: brightness(1.3); }

    .graph-label {
      font-size: 10px;
      fill: var(--text-secondary);
      pointer-events: none;
      font-family: var(--font-mono);
    }

    .graph-link {
      stroke: var(--border);
      stroke-opacity: 0.6;
    }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-success { background: var(--success-glow); color: var(--success); }
    .badge-danger { background: var(--danger-glow); color: var(--danger); }
    .badge-warning { background: var(--warning-glow); color: var(--warning); }
    .badge-accent { background: var(--accent-glow); color: var(--accent); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Pattern/Failure items */
    .list-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: var(--transition-fast);
    }

    .list-item:hover { background: var(--accent-glow); }

    .list-item:last-child { border-bottom: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        display: none;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        width: 240px;
      }
      .sidebar.open { display: flex; }
      .main { padding: 16px; }
      .cards { grid-template-columns: repeat(2, 1fr); }
    }

    /* Focus visible for accessibility */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Skip link for accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--accent);
      color: white;
      padding: 8px 16px;
      z-index: 100;
      transition: var(--transition);
    }

    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="app">
    <nav class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="sidebar-logo">
        <span>⚡</span> make-laten
      </div>
      <div class="nav-item active" data-page="overview" tabindex="0" role="button" aria-pressed="true">📊 Overview</div>
      <div class="nav-item" data-page="tokens" tabindex="0" role="button" aria-pressed="false">📈 Tokens</div>
      <div class="nav-item" data-page="compress" tabindex="0" role="button" aria-pressed="false">🗜️ Compress</div>
      <div class="nav-item" data-page="learn" tabindex="0" role="button" aria-pressed="false">🧠 Learn</div>
      <div class="nav-item" data-page="cache" tabindex="0" role="button" aria-pressed="false">📉 Cache</div>
      <div class="nav-item" data-page="graph" tabindex="0" role="button" aria-pressed="false">🔗 Graph</div>
      <div class="nav-item" data-page="activity" tabindex="0" role="button" aria-pressed="false">📋 Activity</div>
    </nav>

    <main class="main" id="main-content">
      <!-- Overview Page -->
      <section id="page-overview" class="page active" aria-label="Overview">
        <div class="cards" id="summary-cards"></div>
        <div class="chart-container">
          <div class="chart-title">Token Usage Over Time</div>
          <canvas id="token-chart"></canvas>
        </div>
        <div class="chart-container">
          <div class="chart-title">Tool Usage</div>
          <canvas id="tool-chart"></canvas>
        </div>
      </section>

      <!-- Tokens Page -->
      <section id="page-tokens" class="page" aria-label="Token usage details">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th scope="col">Tool</th>
                <th scope="col">Model</th>
                <th scope="col">Input</th>
                <th scope="col">Output</th>
                <th scope="col">Cached</th>
                <th scope="col">Savings</th>
                <th scope="col">Time</th>
              </tr>
            </thead>
            <tbody id="tokens-table"></tbody>
          </table>
        </div>
      </section>

      <!-- Compress Page -->
      <section id="page-compress" class="page" aria-label="Compression statistics">
        <div class="cards" id="compress-cards"></div>
        <div class="chart-container">
          <div class="chart-title">Compression Ratio by Tool</div>
          <canvas id="compress-chart"></canvas>
        </div>
      </section>

      <!-- Learn Page -->
      <section id="page-learn" class="page" aria-label="Learned patterns">
        <div class="cards" id="learn-cards"></div>
        <div class="chart-container">
          <div class="chart-title">Patterns</div>
          <div id="patterns-list"></div>
        </div>
        <div class="chart-container">
          <div class="chart-title">Failures</div>
          <div id="failures-list"></div>
        </div>
      </section>

      <!-- Cache Page -->
      <section id="page-cache" class="page" aria-label="Cache statistics">
        <div class="cards" id="cache-cards"></div>
      </section>

      <!-- Graph Page -->
      <section id="page-graph" class="page" aria-label="Code graph visualization">
        <div id="graph-container"></div>
      </section>

      <!-- Activity Page -->
      <section id="page-activity" class="page" aria-label="Activity timeline">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th scope="col">Time</th>
                <th scope="col">Tool</th>
                <th scope="col">Status</th>
                <th scope="col">Tokens</th>
              </tr>
            </thead>
            <tbody id="activity-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => {
          n.classList.remove('active')
          n.setAttribute('aria-pressed', 'false')
        })
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
        item.classList.add('active')
        item.setAttribute('aria-pressed', 'true')
        document.getElementById(`page-${item.dataset.page}`).classList.add('active')
      })

      item.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault()
          item.click()
        }
      })
    })

    // Data loading
    async function loadStats() {
      try {
        const res = await fetch('/api/stats')
        return res.json()
      } catch {
        return { requests: [], summary: { totalRequests: 0, totalInputTokens: 0, totalOutputTokens: 0, totalCachedTokens: 0, estimatedCost: 0, avgCompression: 0, toolUsage: {} } }
      }
    }

    async function loadGraph() {
      try {
        const res = await fetch('/api/graph')
        return res.json()
      } catch {
        return { nodes: [], edges: [] }
      }
    }

    async function loadPatterns() {
      try {
        const res = await fetch('/api/patterns')
        return res.json()
      } catch {
        return { patterns: [] }
      }
    }

    async function loadFailures() {
      try {
        const res = await fetch('/api/failures')
        return res.json()
      } catch {
        return { failures: [] }
      }
    }

    // Format helpers
    function formatTokens(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M'
      if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K'
      return n.toString()
    }

    function formatCost(n) {
      return '~$' + n.toFixed(2)
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleString()
    }

    // Overview page
    async function renderOverview() {
      const data = await loadStats()
      const s = data.summary

      document.getElementById('summary-cards').innerHTML = `
        <div class="card">
          <div class="card-label">Total Requests</div>
          <div class="card-value accent">${s.totalRequests}</div>
        </div>
        <div class="card">
          <div class="card-label">Input Tokens</div>
          <div class="card-value">${formatTokens(s.totalInputTokens)}</div>
        </div>
        <div class="card">
          <div class="card-label">Cached Tokens</div>
          <div class="card-value success">${formatTokens(s.totalCachedTokens)}</div>
        </div>
        <div class="card">
          <div class="card-label">Output Tokens</div>
          <div class="card-value">${formatTokens(s.totalOutputTokens)}</div>
        </div>
        <div class="card">
          <div class="card-label">Estimated Cost</div>
          <div class="card-value warning">${formatCost(s.estimatedCost)}</div>
        </div>
        <div class="card">
          <div class="card-label">Avg Compression</div>
          <div class="card-value success">${(s.avgCompression * 100).toFixed(0)}%</div>
        </div>
      `

      // Token usage chart
      const recent = data.requests.slice(-50)
      if (recent.length > 0) {
        new Chart(document.getElementById('token-chart'), {
          type: 'line',
          data: {
            labels: recent.map((r, i) => i),
            datasets: [
              { label: 'Input', data: recent.map(r => r.inputTokens), borderColor: '#6366f1', fill: true, backgroundColor: 'rgba(99,102,241,0.1)' },
              { label: 'Output', data: recent.map(r => r.outputTokens), borderColor: '#22c55e', fill: true, backgroundColor: 'rgba(34,197,94,0.1)' },
              { label: 'Cached', data: recent.map(r => r.cachedTokens), borderColor: '#eab308', fill: true, backgroundColor: 'rgba(234,179,8,0.1)' }
            ]
          },
          options: {
            responsive: true,
            plugins: { legend: { labels: { color: '#a1a1aa' } } },
            scales: {
              x: { display: false },
              y: { ticks: { color: '#71717a' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
          }
        })
      }

      // Tool usage chart
      const toolLabels = Object.keys(s.toolUsage)
      const toolValues = Object.values(s.toolUsage)
      if (toolLabels.length > 0) {
        new Chart(document.getElementById('tool-chart'), {
          type: 'bar',
          data: {
            labels: toolLabels,
            datasets: [{ label: 'Calls', data: toolValues, backgroundColor: '#6366f1' }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: '#71717a' }, grid: { display: false } },
              y: { ticks: { color: '#71717a' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
          }
        })
      }
    }

    // Tokens page
    async function renderTokens() {
      const data = await loadStats()
      const rows = data.requests.slice().reverse().map(r => `
        <tr>
          <td><span class="badge badge-accent">${r.tool}</span></td>
          <td>${r.model}</td>
          <td>${formatTokens(r.inputTokens)}</td>
          <td>${formatTokens(r.outputTokens)}</td>
          <td>${formatTokens(r.cachedTokens)}</td>
          <td>${(r.compressionRatio * 100).toFixed(0)}%</td>
          <td>${formatTime(r.timestamp)}</td>
        </tr>
      `).join('')
      document.getElementById('tokens-table').innerHTML = rows || '<tr><td colspan="7" class="empty-state">No data yet</td></tr>'
    }

    // Graph page
    async function renderGraph() {
      const graph = await loadGraph()
      const container = document.getElementById('graph-container')

      // Clear previous graph
      container.innerHTML = ''

      if (graph.nodes.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔗</div><div>No graph data yet. Run build-graph to generate.</div></div>'
        return
      }

      const width = container.clientWidth
      const height = container.clientHeight

      const svg = d3.select('#graph-container').append('svg')
        .attr('width', width).attr('height', height)

      const simulation = d3.forceSimulation(graph.nodes)
        .force('link', d3.forceLink(graph.edges).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width / 2, height / 2))

      const link = svg.append('g').selectAll('line')
        .data(graph.edges).enter().append('line')
        .attr('class', 'graph-link')

      const node = svg.append('g').selectAll('circle')
        .data(graph.nodes).enter().append('circle')
        .attr('class', 'graph-node')
        .attr('r', d => d.type === 'file' ? 8 : 5)
        .attr('fill', d => {
          const colors = { file: '#6366f1', function: '#22c55e', class: '#eab308', method: '#ef4444', import: '#71717a' }
          return colors[d.type] || '#71717a'
        })
        .call(d3.drag()
          .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y })
          .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y })
          .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null })
        )

      const label = svg.append('g').selectAll('text')
        .data(graph.nodes).enter().append('text')
        .attr('class', 'graph-label')
        .attr('dx', 12).attr('dy', 4)
        .text(d => d.name.split('/').pop())

      simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y)
        node.attr('cx', d => d.x).attr('cy', d => d.y)
        label.attr('x', d => d.x).attr('y', d => d.y)
      })
    }

    // Init
    renderOverview()
    renderTokens()
    renderGraph()
  </script>
</body>
</html>
